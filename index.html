<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:; connect-src 'none';" />
    <title>Canvas Learning</title>
    <link rel="stylesheet" href="./node_modules/@xterm/xterm/css/xterm.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="canvas-sidebar" aria-label="Canvas manager">
        <button class="sidebar-edge-handle" id="sidebar-toggle-button" type="button" aria-label="Open drawer with Command+B">
          <span class="sidebar-edge-handle-lines" aria-hidden="true"></span>
        </button>

        <div class="canvas-sidebar-panel">
          <div class="canvas-sidebar-controls">
            <button class="canvas-create-button" id="create-canvas-button" type="button">New canvas</button>

            <div class="canvas-file-actions" aria-label="Canvas file actions">
              <button class="canvas-secondary-button" id="export-canvas-button" type="button">Export canvas</button>
              <button class="canvas-secondary-button" id="import-canvas-button" type="button">Import canvas</button>
              <button class="canvas-secondary-button" id="open-workspace-button" type="button">Open workspace</button>
              <button class="canvas-secondary-button" id="refresh-workspace-button" type="button">Refresh</button>
            </div>
          </div>

          <div class="canvas-sidebar-content">
            <section class="sidebar-section" id="canvas-list-section" aria-label="Canvas list section">
              <div class="sidebar-section-header">Canvases</div>
              <ul class="canvas-list" id="canvas-list" aria-label="Available canvases"></ul>
            </section>

            <section class="sidebar-section" id="workspace-folders-section" aria-label="Imported folders section">
              <div class="sidebar-section-header">Workspaces</div>
              <ul class="canvas-list workspace-folder-list" id="workspace-folder-list" aria-label="Imported folders"></ul>
            </section>

            <section class="sidebar-section" id="workspace-browser-section" aria-label="Workspace browser section">
              <div class="sidebar-section-header">Workspace</div>
              <div class="workspace-browser" id="workspace-browser" aria-live="polite"></div>
            </section>
          </div>
        </div>
      </aside>

      <main class="workspace-shell">
        <section class="board" id="board">
          <div class="board-grid" aria-hidden="true"></div>

          <div class="board-zoom-indicator" id="board-zoom-indicator" aria-live="polite" aria-atomic="true">100%</div>

          <button class="board-fullscreen-exit" id="board-fullscreen-exit" type="button" aria-label="Exit terminal fullscreen">
            Exit fullscreen
          </button>

          <div class="board-hints" id="board-hints" aria-live="polite">
            <span class="board-hint-chip">Double-click to open a terminal</span>
            <span class="board-hint-chip">Drag to move the canvas</span>
            <span class="board-hint-chip">Cmd/Ctrl + wheel to zoom</span>
            <span class="board-hint-chip">Cmd+B for left drawer</span>
            <span class="board-hint-chip">Cmd+L to close preview</span>
          </div>

          <div class="empty-state" id="empty-state">
            <strong class="empty-state-title">Double-click to open a terminal</strong>
            <span class="empty-state-copy">Drag to move the canvas. Cmd/Ctrl + wheel to zoom.</span>
          </div>

          <section class="nodes-layer" id="nodes-layer" aria-label="Infinite terminal canvas"></section>
        </section>
      </main>

      <aside class="file-inspector" id="file-inspector" aria-label="File preview"></aside>
    </div>

    <script src="./node_modules/@xterm/xterm/lib/xterm.js"></script>
    <script src="./node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
    <script src="./renderer.js"></script>
  </body>
</html>
