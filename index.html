<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob:; frame-src 'self' blob:; connect-src 'none';" />
    <title>Canvas Learning</title>
    <link rel="stylesheet" href="./node_modules/@xterm/xterm/css/xterm.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="canvas-sidebar" aria-label="Canvas manager">
        <button class="sidebar-edge-handle" id="sidebar-toggle-button" type="button" aria-label="Open drawer with Command+B">
          <span class="sidebar-edge-handle-lines" aria-hidden="true"></span>
        </button>

        <div class="panel-resize-handle sidebar-resize-handle" id="sidebar-resize-handle" aria-hidden="true"></div>

        <div class="canvas-sidebar-panel">
          <div class="canvas-sidebar-content">
            <section class="sidebar-section sidebar-primary-section sidebar-switcher-section" id="canvas-switcher-section" aria-label="Canvas switcher section">
              <div class="sidebar-section-header-row sidebar-switcher-header-row">
                <button class="canvas-switcher-trigger" id="canvas-switcher-button" type="button" aria-label="Switch canvases" aria-expanded="false" aria-controls="canvas-switcher-list">
                  <span class="canvas-switcher-trigger-copy">
                    <span class="canvas-switcher-trigger-label">Canvas</span>
                    <span class="canvas-switcher-trigger-name" id="canvas-switcher-name">Canvas</span>
                    <span class="canvas-switcher-trigger-meta" id="canvas-switcher-meta">No workspace linked</span>
                    <span class="canvas-switcher-trigger-path" id="canvas-switcher-path">Choose a workspace for this canvas.</span>
                  </span>

                  <svg class="canvas-switcher-trigger-icon" viewBox="0 0 16 16" aria-hidden="true">
                    <path d="m4.25 6.25 3.75 3.75 3.75-3.75"></path>
                  </svg>
                </button>

                <div class="sidebar-section-actions" aria-label="Canvas actions">
                  <button class="canvas-list-action sidebar-section-action" id="create-canvas-button" type="button" aria-label="New canvas" title="New canvas">
                    <svg class="sidebar-section-icon" viewBox="0 0 16 16" aria-hidden="true">
                      <path d="M8 3.25v9.5"></path>
                      <path d="M3.25 8h9.5"></path>
                    </svg>
                  </button>

                  <button class="canvas-list-action sidebar-section-action" id="export-canvas-button" type="button" aria-label="Export canvas" title="Export canvas">
                    <svg class="sidebar-section-icon" viewBox="0 0 16 16" aria-hidden="true">
                      <path d="M8 10.75V3.5"></path>
                      <path d="M5.25 6.25 8 3.5l2.75 2.75"></path>
                      <path d="M3.25 12.5h9.5"></path>
                    </svg>
                  </button>

                  <button class="canvas-list-action sidebar-section-action" id="import-canvas-button" type="button" aria-label="Import canvas" title="Import canvas">
                    <svg class="sidebar-section-icon" viewBox="0 0 16 16" aria-hidden="true">
                      <path d="M8 3.5v7.25"></path>
                      <path d="M5.25 8 8 10.75 10.75 8"></path>
                      <path d="M3.25 12.5h9.5"></path>
                    </svg>
                  </button>
                </div>
              </div>

              <div class="canvas-switcher-menu" id="canvas-switcher-menu" hidden></div>
            </section>

            <section class="sidebar-section sidebar-primary-section" id="workspace-browser-section" aria-label="Workspace browser section">
              <div class="sidebar-section-header-row">
                <div class="sidebar-section-header">Workspace</div>

                <div class="sidebar-section-actions" aria-label="Workspace actions">
                  <button class="canvas-list-action sidebar-section-action" id="open-workspace-button" type="button" aria-label="Open workspace" title="Open workspace">
                    <svg class="sidebar-section-icon" viewBox="0 0 16 16" aria-hidden="true">
                      <path d="M2.5 5h3.5l1.25-1.5h5.25a1 1 0 0 1 1 1v1"></path>
                      <path d="M2.5 5h11a1 1 0 0 1 1 1v5.5a1 1 0 0 1-1 1h-11a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1Z"></path>
                    </svg>
                  </button>

                  <button class="canvas-list-action sidebar-section-action" id="refresh-workspace-button" type="button" aria-label="Refresh workspace" title="Refresh workspace">
                    <svg class="sidebar-section-icon" viewBox="0 0 16 16" aria-hidden="true">
                      <path d="M12.75 5V2.75H10.5"></path>
                      <path d="M12.75 2.75A5.5 5.5 0 1 0 13.5 9"></path>
                    </svg>
                  </button>
                </div>
              </div>

              <div class="workspace-browser" id="workspace-browser" aria-live="polite"></div>
            </section>
          </div>
        </div>
      </aside>

      <main class="workspace-shell">
        <section class="board" id="board">
          <div class="board-grid" aria-hidden="true"></div>

          <div class="board-zoom-indicator" id="board-zoom-indicator" aria-live="polite" aria-atomic="true">100%</div>

          <button class="board-fullscreen-exit" id="board-fullscreen-exit" type="button" aria-label="Exit terminal fullscreen">
            Exit fullscreen
          </button>

          <div class="board-hints" id="board-hints" aria-live="polite">
            <span class="board-hint-chip">Double-click to open a terminal</span>
            <span class="board-hint-chip">Drag to move the canvas</span>
            <span class="board-hint-chip">Cmd/Ctrl + wheel to zoom</span>
            <span class="board-hint-chip">Cmd+B for left drawer</span>
            <span class="board-hint-chip">Cmd+L to close preview</span>
          </div>

          <div class="empty-state" id="empty-state">
            <strong class="empty-state-title">Double-click to open a terminal</strong>
            <span class="empty-state-copy">Drag to move the canvas. Cmd/Ctrl + wheel to zoom.</span>
          </div>

          <section class="nodes-layer" id="nodes-layer" aria-label="Infinite terminal canvas"></section>
        </section>
      </main>

      <div class="panel-resize-handle inspector-resize-handle" id="file-inspector-resize-handle" aria-hidden="true"></div>
      <aside class="file-inspector" id="file-inspector" aria-label="File preview"></aside>
    </div>

    <script src="./node_modules/@xterm/xterm/lib/xterm.js"></script>
    <script src="./node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
    <script src="./renderer_workspace.js"></script>
    <script src="./renderer_canvas_switcher.js"></script>
    <script src="./renderer_workspace_preview.js"></script>
    <script src="./renderer.js"></script>
  </body>
</html>
