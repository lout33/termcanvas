name: Release macOS Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-macos:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Read package version
        id: package_version
        run: |
          echo "value=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package version
        run: node scripts/verify-release-tag.js
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Build macOS release artifacts
        run: npm run dist:mac

      - name: Verify release artifact files exist
        run: |
          ls "release/TermCanvas-${{ steps.package_version.outputs.value }}-arm64.dmg"
          ls "release/TermCanvas-${{ steps.package_version.outputs.value }}-arm64-mac.zip"

      - name: Create GitHub release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release/TermCanvas-${{ steps.package_version.outputs.value }}-arm64.dmg
            release/TermCanvas-${{ steps.package_version.outputs.value }}-arm64-mac.zip
